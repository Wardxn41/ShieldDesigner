<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Shield Designer</title>

  <!-- DM Sans: precision UI workhorse. Cormorant: display moments only. DM Mono: numbers. -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@400;500&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
<div class="app" id="appRoot">

  <!-- ╔══════════════════════════════════════════════╗
       ║  LEFT SIDEBAR — Shield Library               ║
       ╚══════════════════════════════════════════════╝ -->
  <aside class="sidebar left" id="leftSidebar">
    <div class="sidebar-header">
      <div class="brand">
        Shield Designer
        <span class="brand-sub">Collections</span>
      </div>
      <button id="newDesignBtn" type="button">+ New</button>
    </div>

    <div class="sidebar-content">
      <div id="designList" class="design-list" aria-label="Design list"></div>
    </div>

    <button class="sidebar-min-btn" id="minLeftBtn" type="button">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
        <path d="M8 2L4 6l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Hide panel
    </button>
  </aside>

  <!-- ╔══════════════════════════════════════════════╗
       ║  CENTER — Canvas Stage                       ║
       ╚══════════════════════════════════════════════╝ -->
  <main class="stage">
    <div class="shield-wrap">
      <div class="shield-frame">
        <canvas id="displayCanvas" width="620" height="800"></canvas>
        <canvas id="guidesCanvas"  width="620" height="800" aria-hidden="true"></canvas>
      </div>
    </div>
  </main>

  <!-- ╔══════════════════════════════════════════════╗
       ║  RIGHT SIDEBAR — Tools                       ║
       ╚══════════════════════════════════════════════╝ -->
  <aside class="sidebar right" id="rightSidebar">
    <div class="sidebar-header">
      <div class="brand">
        Tools
        <span class="brand-sub">Properties</span>
      </div>
      <button id="clearStampBtn" class="btn subtle" type="button" style="font-size:11px; height:28px; padding: 0 10px;">Clear</button>
    </div>

    <div class="sidebar-content">

      <!-- ── Shield Shape ──────────────────────────────── -->
      <div class="panel collapsible" id="shapePanel">
        <button class="panel-head" type="button">
          <span>Shield Shape</span>
          <span class="chev">▾</span>
        </button>
        <div class="panel-body">
          <div id="shapeSelector" class="shape-selector"></div>
        </div>
      </div>

      <!-- ── Background ───────────────────────────────── -->
      <div class="panel collapsible" id="backgroundPanel">
        <button class="panel-head" type="button">
          <span>Background</span>
          <span class="chev">▾</span>
        </button>
        <div class="panel-body">
          <div id="backgroundSelector"></div>
        </div>
      </div>

      <!-- ── Color & Brush ────────────────────────────── -->
      <div class="panel collapsible" id="colorPanel">
        <button class="panel-head" type="button">
          <span>Color &amp; Brush</span>
          <span class="chev">▾</span>
        </button>
        <div class="panel-body">
          <div class="row" style="padding: 6px 8px 10px; gap: 10px;">
            <input id="colorPicker" type="color" value="#d6a84b" />
            <div style="flex:1; min-width:0;">
              <div class="row" style="margin:0; padding:0;">
                <label class="label" for="brushSize">Brush</label>
                <input id="brushSize" type="range" min="1" max="80" value="8" />
                <span id="brushSizeVal" class="pill">8</span>
              </div>
              <div class="row" style="margin-top:6px; padding:0;">
                <label class="label" for="brushOpacity">Opacity</label>
                <input id="brushOpacity" type="range" min="0.05" max="1" step="0.05" value="1" />
                <span id="brushOpacityVal" class="pill">1.00</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- ── Layers ───────────────────────────────────── -->
      <div class="panel collapsible" id="layersPanel">
        <button class="panel-head" type="button">
          <span>Layers</span>
          <span class="chev">▾</span>
        </button>
        <div class="panel-body">
          <div style="display:flex; gap:6px; padding:0 4px 8px;">
            <button id="addLayerBtn" class="btn" type="button" style="flex:1; font-size:11px; height:30px;">
              <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
                <path d="M5 1v8M1 5h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
              Add Layer
            </button>
            <button id="deleteLayerBtn" class="btn subtle" type="button" style="font-size:11px; height:30px; padding:0 10px;">
              <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
                <path d="M2 3h6M4 1h2M3.5 3v5.5M6.5 3v5.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
              </svg>
              Delete
            </button>
          </div>
          <div id="layersList" class="layers-list" aria-label="Layers"></div>
        </div>
      </div>

      <!-- ── Selected Stamp Controls ──────────────────── -->
      <div id="stampControlsPanel" style="display:none;">
        <div style="padding:0 4px 4px;">
          <div class="stamp-selected-label">Selected Stamp</div>
          <div class="row" style="padding:4px 0;">
            <span class="label">Opacity</span>
            <input type="range" id="stampOpacitySlider" min="0" max="1" step="0.01" value="1" />
            <span class="pill" id="stampOpacityVal">1.00</span>
          </div>
          <div style="display:flex; gap:6px; margin-top:6px;">
            <button class="flip-btn" id="stampFlipHBtn" type="button">↔ Flip H</button>
            <button class="flip-btn" id="stampFlipVBtn" type="button">↕ Flip V</button>
          </div>
        </div>
      </div>

      <!-- ── Stamps & Patterns ─────────────────────────── -->
      <div class="panel collapsible" id="patternsPanel">
        <button class="panel-head" type="button">
          <span>Stamps &amp; Patterns</span>
          <span class="chev">▾</span>
        </button>
        <div class="panel-body">
          <div id="stampList" class="stamp-list" aria-label="Stamps"></div>
        </div>
      </div>

      <!-- ── Settings (collapsed by default) ──────────── -->
      <div class="panel collapsible collapsed" id="settingsPanel">
        <button class="panel-head" type="button">
          <span>Advanced</span>
          <span class="chev">▾</span>
        </button>
        <div class="panel-body">

          <div class="section-label">Symmetry</div>
          <div class="row">
            <label class="label" for="symmetrySelect">Mode</label>
            <select id="symmetrySelect">
              <option value="none">None</option>
              <option value="mirrorX">Mirror X</option>
              <option value="mirrorY">Mirror Y</option>
              <option value="mirrorXY">Mirror Both</option>
              <option value="radial4">Radial ×4</option>
              <option value="radial8">Radial ×8</option>
            </select>
          </div>

          <!-- Hidden mode select — kept for appController compatibility -->
          <select id="modeSelect" style="display:none">
            <option value="draw">Draw</option>
            <option value="erase">Erase</option>
            <option value="fill">Fill</option>
            <option value="unfill">Unfill</option>
            <option value="stamp">Stamp</option>
          </select>

          <div class="divider"></div>
          <div class="section-label">Stamp Defaults</div>
          <div class="row">
            <label class="label" for="stampSize">Size</label>
            <input id="stampSize" type="range" min="40" max="420" value="180" />
            <span id="stampSizeVal" class="pill">180</span>
          </div>
          <div class="row">
            <label class="label" for="stampRot">Rotation</label>
            <input id="stampRot" type="range" min="-180" max="180" value="0" />
            <span id="stampRotVal" class="pill">0°</span>
          </div>

          <div class="divider"></div>
          <div class="section-label">Fill</div>
          <div class="row">
            <label class="label" for="fillTolerance">Tolerance</label>
            <input id="fillTolerance" type="range" min="0" max="80" value="25" />
            <span id="fillToleranceVal" class="pill">25</span>
          </div>

          <div class="divider"></div>
          <div class="section-label">Display</div>
          <div class="row">
            <label class="label" for="guidesToggle">Show guides</label>
            <input id="guidesToggle" type="checkbox" checked />
          </div>
          <div class="row">
            <label class="label" for="gridToggle">1-inch grid</label>
            <input id="gridToggle" type="checkbox" />
          </div>

          <div class="divider"></div>
          <div class="section-label">Real-World Scale</div>
          <div class="row">
            <label class="label" for="shieldWidthIn">Width (in)</label>
            <input id="shieldWidthIn" type="number" min="10" max="80" step="0.25" value="31" />
          </div>
          <div class="row">
            <label class="label" for="shieldHeightIn">Height (in)</label>
            <input id="shieldHeightIn" type="number" min="10" max="100" step="0.25" value="40" />
          </div>
          <div class="row">
            <label class="label" for="shieldCurveIn">Curve depth (in)</label>
            <input id="shieldCurveIn" type="number" min="0" max="24" step="0.25" value="8" />
          </div>
          <div class="row">
            <label class="label">px/in (X · Y)</label>
            <span id="ppiReadout" class="pill">—</span>
          </div>
        </div>
      </div>

    </div><!-- /sidebar-content -->

    <button class="sidebar-min-btn" id="minRightBtn" type="button">
      Hide panel
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
        <path d="M4 2l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </aside>

  <!-- Restore buttons -->
  <button class="sidebar-restore left"  id="restoreLeftBtn"  type="button" aria-label="Show library">
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
      <path d="M4 2l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
  </button>
  <button class="sidebar-restore right" id="restoreRightBtn" type="button" aria-label="Show tools">
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
      <path d="M8 2L4 6l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
  </button>

  <!-- ╔══════════════════════════════════════════════╗
       ║  FLOATING TOOLBAR                            ║
       ╚══════════════════════════════════════════════╝ -->
  <div class="toolbar" id="toolbar" role="toolbar" aria-label="Drawing tools">

    <!-- Drag handle -->
    <div class="toolbar-drag-handle" id="toolbarHandle" title="Drag · double-click to reset" aria-hidden="true">
      <svg width="8" height="14" viewBox="0 0 8 14" fill="currentColor">
        <circle cx="2" cy="2"  r="1.2"/>
        <circle cx="6" cy="2"  r="1.2"/>
        <circle cx="2" cy="7"  r="1.2"/>
        <circle cx="6" cy="7"  r="1.2"/>
        <circle cx="2" cy="12" r="1.2"/>
        <circle cx="6" cy="12" r="1.2"/>
      </svg>
    </div>

    <!-- Drawing tools -->
    <div class="tool-group">
      <button class="tool-btn" id="drawBtn" type="button" title="Draw  D">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M2 10.5L9 3.5a1.5 1.5 0 0 1 2.1 2.1L4.5 12 1.5 12.5l.5-3z" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>Draw</span>
      </button>
      <button class="tool-btn" id="eraseBtn" type="button" title="Erase  E">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M7.5 2.5l4 4-5.5 5.5H2.5v-3.5l5-6z" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M2 12h9.5" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
        <span>Erase</span>
      </button>
      <button class="tool-btn" id="fillBtn" type="button" title="Fill  F">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M4.5 2L1.5 8c-.4 1.2.5 2.5 2 2.5S6 9.2 5.5 8L4.5 2z" stroke-width="1.3" stroke-linecap="round"/>
          <circle cx="11" cy="10" r="2" stroke-width="1.3"/>
          <path d="M8.5 10h.5" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
        <span>Fill</span>
      </button>
      <button class="tool-btn" id="unfillBtn" type="button" title="Unfill  U">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M4.5 2L1.5 8c-.4 1.2.5 2.5 2 2.5S6 9.2 5.5 8L4.5 2z" stroke-width="1.3" stroke-linecap="round" stroke-dasharray="2 1.2"/>
          <path d="M9 8l3 3M12 8l-3 3" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
        <span>Unfill</span>
      </button>
      <button class="tool-btn" id="stampBtn" type="button" title="Stamp  S">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <rect x="1.5" y="7" width="11" height="6" rx="1" stroke-width="1.3"/>
          <path d="M4.5 7V5a2.5 2.5 0 0 1 5 0v2" stroke-width="1.3" stroke-linecap="round"/>
          <circle cx="7" cy="10" r="1" fill="currentColor"/>
        </svg>
        <span>Stamp</span>
      </button>
    </div>

    <div class="sep"></div>

    <!-- History -->
    <div class="tool-group">
      <button class="tool-btn subtle" id="undoBtn" type="button" title="Undo  Z">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
          <path d="M1.5 6A5 5 0 1 1 3 9.5M1.5 2.5V6H5" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>Undo</span>
      </button>
      <button class="tool-btn subtle" id="redoBtn" type="button" title="Redo  Y">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
          <path d="M11.5 6A5 5 0 1 0 10 9.5M11.5 2.5V6H8" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>Redo</span>
      </button>
    </div>

    <div class="sep"></div>

    <!-- Export + Help -->
    <div class="tool-group">
      <button class="tool-btn subtle" id="exportBtn" type="button" title="Export PNG">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
          <path d="M6.5 1.5v7M4 6l2.5 2.5L9 6" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M1.5 10.5h10" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
        <span>Export</span>
      </button>
      <button class="tool-btn subtle" id="helpBtn" type="button" title="Shortcuts  ?">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
          <circle cx="6.5" cy="6.5" r="5" stroke-width="1.3"/>
          <path d="M4.8 4.8a1.7 1.7 0 0 1 3.4.4c0 1.2-1.7 1.5-1.7 2.8" stroke-width="1.3" stroke-linecap="round"/>
          <circle cx="6.5" cy="9.5" r=".6" fill="currentColor"/>
        </svg>
        <span>Help</span>
      </button>
    </div>

  </div><!-- /toolbar -->

</div><!-- /app -->

<script src="/config.js"></script>
<script type="module" src="/static/app.js"></script>
<script>
  // Panel collapse
  document.querySelectorAll('.panel.collapsible .panel-head').forEach(btn => {
    btn.addEventListener('click', () => {
      btn.closest('.panel').classList.toggle('collapsed');
    });
  });

  // Help button
  document.getElementById('helpBtn')?.addEventListener('click', () => {
    window.__shortcutsOverlayToggle?.();
  });
</script>
</body>
</html>
